name: local-gate

on:
  workflow_dispatch:
  pull_request:

jobs:
  local-gate:
    name: local-gate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: agent_wechat
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d agent_wechat"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: swarm-ide-chore-specs-mvp/backend/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl jq postgresql-client

      - name: Install backend dependencies
        working-directory: swarm-ide-chore-specs-mvp/backend
        run: npm ci

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            if pg_isready -h 127.0.0.1 -p 5432 -U postgres -d agent_wechat; then
              exit 0
            fi
            sleep 2
          done
          echo "PostgreSQL did not become ready in time"
          exit 1

      - name: Run local gate
        env:
          CI: "1"
        run: |
          chmod +x scripts/local-gate.sh
          bash scripts/local-gate.sh

      - name: Upload local gate logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: local-gate-logs-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            .golutra/agents/logs/*.log
            .golutra/agents/logs/**
            /tmp/local-gate*.log
